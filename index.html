<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Felipe & Rayssa - Galeria de Casamento</title>
    <!-- GLOBAL ERROR TRAP PARA AVISAR O USUARIO CASO CAIA O JS DO CELULAR DELE -->
    <script>
        window.onerror = function(msg, source, lineno, colno, error) {
            alert("Erro Fatal Mobile: " + msg + " \nLinha: " + lineno);
        };
    </script>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="container">
            <h1>Felipe & Rayssa</h1>
            <p class="subtitle">Compartilhe seus momentos desse dia especial</p>
        </div>
    </header>

    <main class="container">
        <div class="nav-buttons">
            <button type="button" id="showUpload" class="btn btn-primary">Enviar Foto</button>
            <button type="button" id="showGallery" class="btn btn-secondary">Ver Galeria</button>
        </div>

        <!-- Upload Section -->
        <section id="uploadSection" class="active">
            <div class="upload-card">
                <div class="tutorial-message"
                    style="background: #FFF1E6; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; color: var(--color-dark); font-size: 0.9rem; border: 1px dashed var(--color-gold);">
                    <strong>📸 Como compartilhar?</strong><br>
                    1. Escolha suas fotos tocando abaixo.<br>
                    2. Pressione "Enviar Foto".<br>
                    3. Depois passe para aba <strong>Ver Galeria</strong> (no topo) para ver todas as lembranças juntas!
                </div>
                <form id="uploadForm">
                    <div class="form-group">
                        <label for="nameInput">Seu Nome (Opcional)</label>
                        <input type="text" id="nameInput" placeholder="Ex: João Silva">
                    </div>
                    <div class="form-group">
                        <label>Sua Foto</label>
                        <label class="file-input-wrapper" for="photoInput">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <span>Toque para selecionar</span>
                            <input type="file" id="photoInput" accept="image/*" multiple />
                        </label>
                    </div>
                    <div class="preview-container">
                        <img id="imagePreview" src="" alt="Preview">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Enviar
                        Foto</button>
                </form>
            </div>
        </section>

        <!-- Gallery Section -->
        <section id="gallerySection">
            <div id="galleryGrid" class="gallery-grid">
                <!-- Photos will be loaded here -->
            </div>
        </section>
    </main>

    <!-- Image Modal -->
    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <div class="modal-content">
            <img id="modalImg" src="" alt="Enlarged view">
            <div id="modalFooter" style="text-align: center; margin-top: 15px; width: 100%;">
                <p id="modalAuthor" style="color: white; margin-bottom: 15px; font-weight: 500; font-size: 1.1rem;"></p>
                <a id="modalDownload" href="#" target="_blank" class="btn btn-primary" style="display: inline-block; text-decoration: none;">
                    <i class="fas fa-download"></i> Baixar Foto
                </a>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="loader"></div>
        <p>Enviando sua foto...</p>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script type="module" src="/script.js"></script>
</body>

</html>
